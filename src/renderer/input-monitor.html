<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    :root { --expr: #f0c040; --system: #a78fff; --bg-entry: rgba(0,0,0,0.6); }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; }

    #titlebar {
      -webkit-app-region: drag;
      background: rgba(10,10,20,0.9);
      border-bottom: 1px solid #333;
      padding: 4px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
      height: 26px;
    }
    #titlebar span { font-size: 11px; color: #666; font-family: "Segoe UI", sans-serif; }
    #closeBtn {
      -webkit-app-region: no-drag;
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 13px;
      line-height: 1;
      padding: 2px 5px;
      font-family: inherit;
    }
    #closeBtn:hover { color: #fff; }

    #log {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      top: 26px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      overflow: hidden;
    }

    .entry {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 3px 14px 3px 8px;
      font-family: "Segoe UI", "Noto Sans JP", monospace;
      font-size: 17px;
      font-weight: 700;
      color: #fff;
      background: var(--bg-entry);
      border-left: 3px solid #555;
      letter-spacing: 0.02em;
      white-space: nowrap;
      transition: opacity 0.5s ease;
    }
    .entry.expr   { border-left-color: var(--expr);   color: var(--expr); }
    .entry.system { border-left-color: var(--system); color: var(--system); font-size: 14px; }
    .entry.fading { opacity: 0; }
  </style>
</head>
<body>
  <div id="titlebar">
    <span>入力モニター</span>
    <button id="closeBtn">✕</button>
  </div>
  <div id="log"></div>
  <script>require('./input-monitor.js')</script>
</body>
</html>
