<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Standing Picture Controller</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: transparent !important;
      overflow: hidden;
      -webkit-app-region: drag;
      user-select: none;
    }

    #canvas {
      display: block;
      background: transparent;
      -webkit-app-region: no-drag;
    }

    #status {
      position: fixed;
      bottom: 12px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      color: #fff;
      padding: 5px 12px;
      border-radius: 6px;
      font-family: "Segoe UI", sans-serif;
      font-size: 12px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      white-space: nowrap;
      z-index: 100;
    }
    #status.visible { opacity: 1; }

    #hud {
      position: fixed;
      top: 10px;
      left: 10px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      pointer-events: none;
      z-index: 100;
      font-family: "Segoe UI", sans-serif;
      font-size: 10px;
    }
    .hud-row {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(0,0,0,0.5);
      border-radius: 4px;
      padding: 2px 7px;
      color: rgba(255,255,255,0.45);
      white-space: nowrap;
    }
    .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      flex-shrink: 0;
    }
    .dot.on { background: #4ade80; box-shadow: 0 0 4px #4ade80; }
    .dot.connected { background: #4ade80; box-shadow: 0 0 4px #4ade80; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="status"></div>
  <div id="hud">
    <div class="hud-row" id="info"></div>
    <div class="hud-row">
      <span class="dot" id="gp-dot"></span>
      <span id="gp-text">未接続</span>
    </div>
    <div class="hud-row">
      <span class="dot" id="lip-dot"></span>
      <span id="lip-text">口パク</span>
    </div>
  </div>
  <script>require('./renderer.js')</script>
</body>
</html>
